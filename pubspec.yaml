name: sowlab_assignment
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_svg: ^2.2.4
  get: ^4.7.3
  firebase_core: ^3.11.0
  firebase_auth: ^5.5.0
  cloud_firestore: ^5.6.3
  firebase_storage: ^12.4.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0


flutter:
  uses-material-design: true


  assets:
    - assets/svgs/

  fonts:
    - family: BeVietnam
      fonts:
        - asset: assets/fonts/BeVietnam-Regular.ttf
          weight: 400
        - asset: assets/fonts/BeVietnam-Medium.ttf
          weight: 500
        - asset: assets/fonts/BeVietnam-Bold.ttf
          weight: 700
